version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: soc-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  soc-copilot:
    build: .
    container_name: soc-copilot
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: